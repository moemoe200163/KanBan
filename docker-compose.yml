services:
  # Frontend - Nuxt application
  # NUXT_PUBLIC_API_BASE is consumed by the browser, not by container-to-container
  # traffic. We point it at the backend's direct port so the browser
  # can call it without relying on the nginx proxy. The backend
  # CORS allowlist (configured in core/auth.py via ALLOWED_ORIGINS)
  # must include http://127.0.0.1:3010 and http://localhost:3010.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        - NUXT_PUBLIC_API_BASE=http://127.0.0.1:8000/api/v1
        - NUXT_PUBLIC_E2E=1
    container_name: devflow-frontend
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://127.0.0.1:8000/api/v1
      - NUXT_PUBLIC_E2E=1
      - NITRO_PORT=3010
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - devflow-network

  # Backend - FastAPI control plane.
  # Persistent state lives in Postgres; lifespan runs Alembic to head on
  # startup so a fresh `docker compose up` provisions the schema.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: devflow-backend
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-devflow-jwt-secret-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRY_HOURS=24
      - ALLOW_ANONYMOUS_DISPATCH=${ALLOW_ANONYMOUS_DISPATCH:-false}
      - DATABASE_URL=postgresql+asyncpg://devflow:devflow_secret@postgres:5432/devflow
      - SEED_DEV_DATA=${SEED_DEV_DATA:-false}
      # Plan J: seed the dev tenant + 4 dev accounts (superadmin /
      # admin@default / ops@default / user@default, all password
      # dev123!) on startup. Off in production. The seed is
      # idempotent — re-runs on a DB that already has the rows
      # are a no-op.
      - SEED_DEV_TENANTS=${SEED_DEV_TENANTS:-true}
      # Plan C: shared secret the Mavis CLI uses to push events.
      # Override in production via .env or a secret manager; the
      # dev default matches scripts/mavis_worker.py's hard-coded
      # fallback for local development.
      - MAVIS_DISPATCH_TOKEN=${MAVIS_DISPATCH_TOKEN:-mavis-dev-token-2026-06-12}
      # Dev-only: skip JWT validation entirely. The P5 auth rollout is
      # done in code, but for the current single-admin dev workflow we
      # don't want every fetch to need a fresh token. Setting this to
      # ``false`` (or removing the env var) restores normal Bearer
      # token enforcement — useful for prod deploys.
      - DEV_AUTH_BYPASS=${DEV_AUTH_BYPASS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devflow-network

  # Postgres - the official dev / local production-like database.
  # Data survives `docker compose down` because of the named volume;
  # only `docker compose down -v` resets it.
  # Note: host port 5432 is remapped to 5433 to coexist with other
  # Postgres containers on the host. Inside the devflow network the
  # port is still 5432, so DATABASE_URL inside the backend container
  # is unchanged.
  postgres:
    image: postgres:15
    container_name: devflow-postgres
    environment:
      - POSTGRES_DB=devflow
      - POSTGRES_USER=devflow
      - POSTGRES_PASSWORD=devflow_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow -d devflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - devflow-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: devflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Plan D: host bind so Mavis CLI can `cp` artifacts straight
      # from the kanban repo's deliverables/ dir to nginx-served
      # path without dealing with Docker cp / docker exec gymnastics.
      # The host directory is created on first mount if missing.
      - ./deliveries:/var/www/devflow-deliveries:rw
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - devflow-network

  # Redis (placeholder for future pub/sub and job queue)
  redis:
    image: redis:7-alpine
    container_name: devflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - devflow-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  devflow-network:
    driver: bridge
