server {
    listen 80 default_server;
    server_name _;

    # Plan D: static delivery artifacts. Mavis writes its build
    # output to /var/www/devflow-deliveries/<file> via the host
    # bind mount, and the devflow-nginx container serves the same
    # directory at /deliveries/. The path is fixed and discoverable
    # from the front-end — any issue_artifacts row whose
    # path_or_url starts with http://<host>/deliveries/ becomes a
    # playable link.
    location /deliveries/ {
        alias /var/www/devflow-deliveries/;
        autoindex on;
        types {
            text/html html;
            application/javascript js;
            text/css css;
            image/png png;
            image/svg+xml svg;
        }
        add_header Cache-Control "no-cache" always;
    }

    # Backend (FastAPI) - proxy /api/ requests to backend /api/
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Plan I: AI Studio SSE. The /api/ai-studio/conversations/{id}/messages
    # endpoint streams Server-Sent Events token-by-token; nginx
    # would buffer and flush on close without the explicit
    # proxy_buffering off. proxy_read_timeout 1h is generous but
    # mirrors the WS policy (Plan F) — long-running chat sessions
    # can pause between turns. proxy_cache off prevents shared
    # cached chunks between users.
    location /api/ai-studio/ {
        proxy_pass http://backend:8000/api/ai-studio/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # SSE response headers — also add the
        # `text/event-stream` media type hint at the proxy level
        # so caches don't try to encode it.
        add_header X-Accel-Buffering no always;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        # Plan F: longer read timeout so the live-channel WS
        # doesn't get killed by nginx after the default 60s when
        # nothing is being sent. Front-end heartbeats every 30s
        # but the board page may not ping at all.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frontend (Nuxt) — last so /api/, /ws/, /deliveries/ win
    location / {
        proxy_pass http://frontend:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}
