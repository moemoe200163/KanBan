server {
    listen 80 default_server;
    server_name _;

    # Plan D: static delivery artifacts. Mavis writes its build
    # output to /var/www/devflow-deliveries/<file> via the host
    # bind mount, and the devflow-nginx container serves the same
    # directory at /deliveries/. The path is fixed and discoverable
    # from the front-end — any issue_artifacts row whose
    # path_or_url starts with http://<host>/deliveries/ becomes a
    # playable link.
    location /deliveries/ {
        alias /var/www/devflow-deliveries/;
        autoindex on;
        types {
            text/html html;
            application/javascript js;
            text/css css;
            image/png png;
            image/svg+xml svg;
        }
        add_header Cache-Control "no-cache" always;
    }

    # Backend (FastAPI) - proxy /api/ requests to backend /api/
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        # Plan F: longer read timeout so the live-channel WS
        # doesn't get killed by nginx after the default 60s when
        # nothing is being sent. Front-end heartbeats every 30s
        # but the board page may not ping at all.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frontend (Nuxt) — last so /api/, /ws/, /deliveries/ win
    location / {
        proxy_pass http://frontend:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}
