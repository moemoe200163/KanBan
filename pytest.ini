[pytest]
asyncio_mode = strict
testpaths = backend/tests
pythonpath = backend
# Filter aiosqlite cleanup noise only. We do NOT silence real errors:
# both filters are pinned to message + category + (module where stable),
# so any other ResourceWarning or thread-exception variant will still surface.
# Root cause is aiosqlite connections getting GC'd after the event loop
# already closed (worker thread tries to schedule on a dead loop). Fixing
# that properly means rewriting the DB session lifecycle, which is out of
# scope for P0 stability — the underlying tests still pass.
filterwarnings =
    ignore:.*was deleted before being closed.*:ResourceWarning:aiosqlite.core
    ignore:Exception in thread Thread-.*\(_connection_worker_thread\):pytest.PytestUnhandledThreadExceptionWarning
